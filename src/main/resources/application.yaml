spring:
  application:
    name: eurekaserver
  config:
    import: "optional:configserver:"
  cloud:
    config:
      uri: http://localhost:8090

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

